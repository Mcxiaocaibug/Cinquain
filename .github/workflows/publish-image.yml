name: Publish Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platforms:
        description: "Docker platforms to build. Use linux/amd64 for fast deploy images, or linux/amd64,linux/arm64 for multi-arch releases."
        required: true
        default: "linux/amd64"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Cinquain Product Surface
        run: ./cinquain/preflight.sh

      - name: Log In to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Derive Commit Metadata
        id: commit
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Select Docker Platforms
        id: platforms
        shell: bash
        run: |
          selected_platforms="${{ inputs.platforms || '' }}"

          if [ -z "$selected_platforms" ]; then
            if [ "$GITHUB_REF_TYPE" = "tag" ]; then
              selected_platforms="linux/amd64,linux/arm64"
            else
              selected_platforms="linux/amd64"
            fi
          fi

          echo "platforms=$selected_platforms" >> "$GITHUB_OUTPUT"

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ steps.platforms.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CONTINUWUITY_VERSION_EXTRA=+cinquain
            ENABLE_CROSS_LTO=0
            GIT_COMMIT_HASH=${{ github.sha }}
            GIT_COMMIT_HASH_SHORT=${{ steps.commit.outputs.short_sha }}
            GIT_REMOTE_URL=https://github.com/${{ github.repository }}
            GIT_REMOTE_COMMIT_URL=https://github.com/${{ github.repository }}/commit/${{ github.sha }}
